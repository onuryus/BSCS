<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 150" width="600" height="150" fill="none" role="img" aria-label="BSCS — Billion-Scale Chemical Similarity Search">
  <!-- ===== Mark: Benzerlik Halkası ===== -->
  <g transform="translate(15,15)">
    <!-- benzen halkası -->
    <path d="M102 60 L81 96.37 L39 96.37 L18 60 L39 23.63 L81 23.63 Z"
          stroke="#16B8A6" stroke-width="4" stroke-opacity="0.22"/>
    <!-- eşleşme bağı -->
    <line x1="60" y1="60" x2="81" y2="23.63" stroke="#FF6A4D" stroke-width="4.5"/>
    <!-- aday düğümleri -->
    <circle cx="102" cy="60"    r="7" fill="#16B8A6" fill-opacity="0.4"/>
    <circle cx="81"  cy="96.37" r="7" fill="#16B8A6" fill-opacity="0.4"/>
    <circle cx="39"  cy="96.37" r="7" fill="#16B8A6" fill-opacity="0.4"/>
    <circle cx="18"  cy="60"    r="7" fill="#16B8A6" fill-opacity="0.4"/>
    <circle cx="39"  cy="23.63" r="7" fill="#16B8A6" fill-opacity="0.4"/>
    <!-- en yakın komşu -->
    <circle cx="81"  cy="23.63" r="9"  fill="#FF6A4D"/>
    <!-- sorgu molekülü -->
    <circle cx="60"  cy="60"    r="11" fill="#0E8C82"/>
  </g>

  <!-- ===== Wordmark ===== -->
  <text x="158" y="76"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="60" font-weight="700" letter-spacing="-1" fill="#14202E">BSCS</text>
  <text x="160" y="104"
        font-family="'SF Mono', 'Cascadia Code', Menlo, Consolas, monospace"
        font-size="15.5" font-weight="500" letter-spacing="0.3" fill="#0E8C82">Billion-Scale Chemical Similarity Search</text>
</svg>
